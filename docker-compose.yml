services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: table-tennis-dashboard
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production
    networks:
      - dashboard-network

networks:
  dashboard-network:
    driver: bridge
